## 2. 组件接口（Python ABC）

```python
from abc import ABC, abstractmethod
from dataclasses import dataclass, field
from typing import Any

@dataclass
class ComponentManifest:
    """组件自描述信息（对应 manifest.yaml）"""
    id: str
    name: str
    version: str
    type: str
    capability: dict
    io: dict
    collector_requirements: dict = field(default_factory=dict)
    collector_config_template: dict = field(default_factory=dict)
    config_schema: dict = field(default_factory=dict)
    debug_schema: dict = field(default_factory=dict)

class IInferenceComponent(ABC):
    """推理组件基类接口"""

    @abstractmethod
    def get_manifest(self) -> ComponentManifest:
        """返回组件自描述信息"""
        pass

    @abstractmethod
    def initialize(self, config: dict, device: str) -> None:
        """初始化组件

        Args:
            config: 组件配置参数字典
            device: 分配的设备类型 ('npu'/'gpu'/'cpu')
        """
        pass

    @abstractmethod
    def infer(self, input_data: dict) -> dict:
        """同步推理

        Args:
            input_data: {
                'iq_data': complex[],
                'sample_rate': float,
                'center_freq': float (optional)
            }
        Returns:
            {
                'detections': [...],
                'debug': {...} (optional)
            }
        """
        pass

    @abstractmethod
    async def infer_async(self, input_data: dict) -> dict:
        """异步推理（如果组件声明支持 async_inference=True）"""
        pass

    @abstractmethod
    def get_config_schema(self) -> dict:
        """返回配置参数 JSON Schema"""
        pass

    @abstractmethod
    def get_debug_info(self) -> dict:
        """返回当前调试信息"""
        pass

    @abstractmethod
    def release(self) -> None:
        """释放组件占用的资源"""
        pass

    @abstractmethod
    def health_check(self) -> bool:
        """组件健康检查"""
        pass
```

