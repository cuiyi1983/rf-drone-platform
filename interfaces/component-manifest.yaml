## 3. 设备选择协议

平台按以下优先级自动选择设备：

```
优先级: NPU > GPU > CPU
流程:
  1. 读取组件 manifest.capability.device_support
  2. 按优先级尝试每个支持的设备
  3. 首次验证成功则选定
  4. 调用 initialize(config, device) 时传入选定设备
```

设备验证方式（平台实现）:
```python
def validate_device(component: IInferenceComponent, device: str) -> bool:
    """验证组件是否能在指定设备上正常运行"""
    try:
        test_input = {'iq_data': np.random.complex64(1024), 'sample_rate': 60e6}
        component.initialize({}, device)
        result = component.infer(test_input)
        component.release()
        return True
    except Exception:
        return False
```

