## 4. 设备选择

```
优先级: NPU → GPU → CPU
流程:
  1. 推理框架（ONNX Runtime）自动检测可用设备
  2. 按优先级选择可用设备
  3. 组件 manifest.capability.device_support 仅作为声明
```

---

## 5. 与 v1.0 的对比

| 项目 | v1.0 | v2.0 |
|---|---|---|
| 数据格式 | 待定 | IQ 原始帧 |
| burst_count | 声明在 manifest | 组件内部决定 |
| min_sample_rate | 声明在 manifest | 不需要（采样率固定 60MHz）|
| STFT 参数 | 声明在 manifest | 组件内部决定 |
| 丢包/跳帧策略 | 平台决定 | 组件决定 |
| 多线程管理 | 平台决定 | 组件内部决定（通过 Inference Base）|
| min_data_points | 无 | 新增，声明模型需要的数据点数 |