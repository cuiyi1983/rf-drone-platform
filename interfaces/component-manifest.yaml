# 接口协议：推理组件自描述 Manifest

> 版本 v2.3 — 2026-05-14
> 状态：已确立（v2.0 核心变更：简化接口，解耦 Inference Base）

---

## 变更记录

| 版本 | 变更内容 |
|---|---|
| v2.3 | min_data_points 修正为 600000（10ms×60MHz）；新增推荐采集参数（frequency/buffer_size/gain/scan）；配置分层设计支持 |
| v2.0 | 移除 burst_count/min_sample_rate 等字段，简化为 min_data_points；组件不再声明 STFT 参数（内部决定）；数据流改为 IQ 原始帧格式 |
| v1.0 | 初始版本 |

---

## 1. 组件 Manifest 规范

每个推理组件根目录必须包含 `manifest.yaml`，平台通过解析此文件了解组件能力。

### 1.1 完整示例

```yaml
component:
  id: "rfuav-two-stage"           # 全局唯一标识
  name: "RFUAV 两阶段推理组件"      # 人类可读名称
  version: "2.0.0"                 # 语义版本（SemVer）
  author: "小崔崔"                  # 开发者
  type: "inference"                # 组件类型

capability:
  device_support: [npu, gpu, cpu]  # 推理框架自动选择
  async_inference: false            # 组件是否自己管理异步

collector_requirements:
  min_data_points: 600000            # 模型需要的数据点数（60MHz×10ms = 600k）
  # 推荐采集参数（Config Manager 合并时参考）
  frequency: 5805000000             # 中心频率（Hz）
  buffer_size: 524288               # buffer size（samples）
  gain: 20                          # 增益（dB）
  # 轮询配置
  scan:
    enabled: true
    frequencies:
      - 5805000000                  # 5.8 GHz
      - 2450000000                  # 2.4 GHz
    hop_interval_ms: 100

io:
  input:
    - name: iq_data
      type: complex[]              # 原始 IQ 数据
      description: 原始采样数据
    - name: metadata
      type: dict                   # 帧元数据
  output:
    - name: detections
      type: Detection[]
    - name: debug
      type: dict                  # 调试信息，平台原样展示

config_schema:
  confidence_threshold:
    type: number
    title: 置信度阈值
    default: 0.5
    minimum: 0
    maximum: 1
  max_detections:
    type: integer
    title: 最大检测数
    default: 10
```

### 1.2 类型定义

```yaml
Detection:
  model: string              # 机型名
  confidence: number         # 置信度 [0, 1]
  frequency: number          # 信号频率 Hz
  bbox: [x1, y1, x2, y2]    # 检测框像素坐标（可选）
```

