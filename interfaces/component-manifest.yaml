## 2. IQ 帧格式（Platform → Component）

```yaml
iq_frame:
  frame_id: 1234              # 递增帧序号
  burst_id: 100              # burst 序号
  timestamp: 1715678900.123   # Unix 时间戳（秒）
  center_freq: 5800e6        # 当前中心频率（Hz）
  sample_rate: 60e6          # 采样率（Hz）
  iq_data: complex[]          # 原始 IQ 数据
  metadata:
    rx_buffer_size: 8192     # 当时的 buffer size
```

---

## 3. 组件接口（Python ABC）

```python
from abc import ABC, abstractmethod
from dataclasses import dataclass, field
from typing import Any

@dataclass
class ComponentManifest:
    id: str
    name: str
    version: str
    type: str
    capability: dict = field(default_factory=dict)
    io: dict = field(default_factory=dict)
    collector_requirements: dict = field(default_factory=dict)
    config_schema: dict = field(default_factory=dict)

class IInferenceComponent(ABC):
    """推理组件基类接口"""

    @abstractmethod
    def get_manifest(self) -> ComponentManifest:
        """返回组件自描述信息"""
        pass

    @abstractmethod
    def initialize(self, config: dict, device: str) -> None:
        """初始化组件

        Args:
            config: 组件配置参数字典
            device: 分配的设备类型 ('npu'/'gpu'/'cpu')
        """
        pass

    @abstractmethod
    def infer(self, iq_frame: dict) -> dict:
        """单帧推理

        组件自行决定处理逻辑：
        - 是否采纳此帧（丢包策略）
        - 是否缓冲（跳帧策略）
        - STFT 参数和位置
        - 多线程调度

        Args:
            iq_frame: {
                'frame_id': int,
                'burst_id': int,
                'timestamp': float,
                'center_freq': float,
                'sample_rate': float,
                'iq_data': complex[],
                'metadata': dict
            }

        Returns:
            {
                'frame_id': int,           # 对应帧号
                'detections': [...],         # 推理结果
                'debug': {...}              # 调试信息（平台原样展示）
            }
        """
        pass

    @abstractmethod
    def get_config_schema(self) -> dict:
        """返回配置参数 JSON Schema"""
        pass

    @abstractmethod
    def release(self) -> None:
        """释放组件占用的资源"""
        pass

    @abstractmethod
    def health_check(self) -> bool:
        """组件健康检查"""
        pass
```

