# 接口协议：推理组件自描述 Manifest

> 版本 v1.0 — 2026-05-14
> 状态：已确立
> 负责Agent：技术总监

---

## 1. 组件 Manifest 规范

每个推理组件根目录必须包含 `manifest.yaml`，平台通过解析此文件了解组件能力。

### 1.1 完整示例

```yaml
component:
  id: "rfuav-two-stage"           # 全局唯一标识（语义化）
  name: "RFUAV 两阶段推理组件"      # 人类可读名称
  version: "2.0.0"                 # 语义版本（SemVer）
  author: "小崔崔"                  # 开发者
  type: "inference"                # 组件类型
  description: "RFUAV YOLO检测 + ResNet分类两阶段推理"

capability:
  # 支持的推理设备（平台按此选择可用设备）
  device_support: [npu, gpu, cpu]

  # 是否支持各特性
  async_inference: true             # 支持异步推理
  batch_inference: false            # 支持批处理
  multi_model_joint: false         # 支持多模型并发判决

io:
  input:
    - name: iq_data
      type: complex64[]
      description: IQ采样数据
      required: true
    - name: sample_rate
      type: float
      unit: Hz
      description: 采样率
      required: true
    - name: center_freq
      type: float
      unit: Hz
      description: 中心频率
      required: false
      default: 5800e6

  output:
    - name: detections
      type: Detection[]
      description: 检测结果列表
    - name: debug
      type: DebugInfo
      description: 调试信息（可选）

# 推理组件对采数模块的要求（声明式）
collector_requirements:
  min_sample_rate:
    value: 60e6
    unit: Hz
    description: 最低采样率
  recommended_sample_rate:
    value: 100e6
    unit: Hz
    description: 推荐采样率
  frequency_range:
    start: 5.7e9
    end: 6.0e9
    unit: Hz
    description: 需要的频率范围
  min_burst_count:
    value: 200
    description: 最低burst数
  signal_type:
    value: frequency_hopping
    description: 信号类型（frequency_hopping/fixed_frequency）

# 采数配置模板（推荐值，平台作为默认值）
collector_config_template:
  mode: frequency_hopping
  frequencies: [5760, 5775, 5800, 5825, 5850]  # MHz
  sample_rate: 60e6                             # Hz
  burst_count: 200
  gain: 60                                     # dB
  hop_interval_ms: 100

# 配置参数 Schema（用于平台动态生成UI）
config_schema:
  confidence_threshold:
    type: number
    title: 置信度阈值
    default: 0.5
    minimum: 0
    maximum: 1
    step: 0.01
  nms_threshold:
    type: number
    title: NMS阈值
    default: 0.45
    minimum: 0
    maximum: 1
  max_detections:
    type: integer
    title: 最大检测数
    default: 10

# 调试信息 Schema
debug_schema:
  latency_ms:
    type: number
    description: 推理延迟（毫秒）
  memory_usage_mb:
    type: number
    description: 内存占用（MB）
  device_utilization:
    type: number
    description: 设备利用率（0-100%）
```

### 1.2 类型定义

```yaml
# Detection 类型
Detection:
  model: string              # 机型名
  confidence: number         # 置信度 [0, 1]
  frequency: number         # 信号频率 Hz
  bbox: [x1, y1, x2, y2]  # 检测框像素坐标（可选）
  stage: integer            # 推理阶段（1=检测, 2=分类）

# DebugInfo 类型
DebugInfo:
  latency_ms: number
  memory_usage_mb: number
  device: string            # 当前使用的设备
  inference_count: integer  # 推理次数
```

