## 1. Collector Service HTTP API

Collector Service 部署在独立服务器，Platform Backend 通过 HTTP 调用。

### 1.1 基础信息

```
Base URL: http://<collector-server>:8080/api/v1
Content-Type: application/json
```

### 1.2 采集控制接口

#### POST /collector/start
开始采集

```yaml
Request:
  body:
    mode: pluto              # "pluto" | "simulator"
    config:
      frequencies: [5760, 5775, 5800, 5825, 5850]  # MHz
      sample_rate: 60e6      # Hz（固定值，不协商）
      gain: 20               # dB（经验值）
      hop_interval_ms: 100

Response:
  200:
    code: 0
    message: "采集已开始"
    session_id: "uuid-string"
```

#### POST /collector/stop
停止采集

```yaml
Request:
  body:
    session_id: "uuid-string"

Response:
  200:
    code: 0
    message: "采集已停止"
    stats:
      total_frames: 1000
      dropped_frames: 0
      duration_ms: 5000
```

#### GET /collector/status
查询采集状态

```yaml
Response:
  200:
    code: 0
    status: idle | running | error
    mode: pluto
    device_info:
      uri: "usb:2.6.5"
      connected: true
      temperature: 45.2
    current_config:
      center_freq: 5800
      sample_rate: 60e6
      gain: 20
```

### 1.3 设备管理接口

#### GET /collector/devices
查询可用设备

```yaml
Response:
  200:
    code: 0
    devices:
      - id: "usb:2.6.5"
        type: pluto
        name: "ADALM PLUTO"
        connected: true
        fw_version: "v0.34"
```

#### POST /collector/discover
首次运行时探测设备能力（仅首次/SN变化时执行）

```yaml
Response:
  200:
    code: 0
    capabilities:
      frequency:
        type: int
        range: [325000000, 6000000000]
        default: 5805000000
      buffer_size:
        type: int
        range: [1024, 1048576]
        default: 524288
      gain:
        type: float
        range: [0, 60]
        default: 20
      sample_rate:
        type: int
        fixed: 60000000
      rf_bandwidth:
        type: int
        fixed: 56000000
```

### 1.4 模拟器接口

#### POST /collector/simulator/load
加载 IQ 数据文件

```yaml
Request:
  body:
    file_path: "/data/test.npy"

Response:
  200:
    code: 0
    metadata:
      sample_count: 600000
      sample_rate: 60e6
      duration_ms: 10
```

### 1.5 WebSocket 实时流

#### WS /collector/stream
实时 IQ 帧流（推送模式）

**Platform Backend 建立 WebSocket 连接后，Collector 持续推送 IQ 帧：**

```json
{
  "type": "iq_frame",
  "session_id": "uuid",
  "frame": {
    "frame_id": 1234,
    "burst_id": 100,
    "timestamp": 1715678900.123,
    "center_freq": 5800e6,
    "sample_rate": 60e6,
    "iq_data": [[real, imag], ...],
    "metadata": {
      "rx_buffer_size": 8192
    }
  }
}
```

