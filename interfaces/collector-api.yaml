## 2. 异常处理

| 错误码 | 说明 |
|---|---|
| 400 | 参数错误 |
| 404 | 设备未找到 |
| 409 | 设备已被占用 |
| 500 | 设备错误 |
| 503 | 服务不可用 |

---

## 3. 与 v1.0 的对比

| 项目 | v1.0 | v2.0 |
|---|---|---|
| burst_count | config 中声明 | 不在 config 中（组件内部决定）|
| sample_rate | 可配置 | 固定 60MHz（PLUTO-001）|
| gain | 60 dB | 20 dB（经验值 PLUTO-004）|
| /collector/discover | 无 | 新增（能力探测）|