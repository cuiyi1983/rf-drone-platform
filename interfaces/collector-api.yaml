## 2. Collector 异常处理

```yaml
Error Codes:
  400: 参数错误
  404: 设备未找到
  409: 设备已被占用
  500: 设备错误
  503: 服务不可用
```

设备断开时的行为：
1. Collector Service 立即推送 `error` 类型的 WebSocket 消息
2. 自动尝试重连（最多3次，间隔1秒）
3. 重连失败后推送 `disconnected` 消息
4. Platform Backend 收到后应切换到错误状态并通知前端

