## 5. 错误码

### 5.1 业务错误码

| 错误码 | 含义 | HTTP Status |
|---|---|---|
| 1001 | 组件不存在 | 404 |
| 1002 | 组件初始化失败 | 500 |
| 1003 | 会话不存在 | 404 |
| 1004 | 会话已停止 | 400 |
| 1005 | 配置参数无效 | 400 |
| 1006 | 设备不存在或未连接 | 404 |
| 1007 | 设备能力不足 | 400 |

### 5.2 Socket.IO 错误码

| 错误码 | 含义 |
|---|---|
| 2001 | 组件运行时错误 |
| 2002 | 采集卡丢失 |
| 2003 | 帧队列溢出 |
| 2004 | 模型推理超时 |
| 2005 | 设备连接断开 |

### 5.3 系统错误码

| 错误码 | 含义 | HTTP Status |
|---|---|---|
| 3001 | 服务器内部错误 | 500 |
| 3002 | 服务不可用 | 503 |
| 3003 | 请求超时 | 408 |

