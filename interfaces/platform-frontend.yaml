### 3.2 前台 → 后台

#### 订阅会话

**Event:** `subscribe`

```yaml
{
  "session_id": "sess_abc123"           # string, 必填, 要订阅的会话ID
}
```

**Response (Socket.IO ack):**

```yaml
{
  "success": true,
  "subscribed_events": ["inference_result", "collector_stats", "device_status", "error"]
}
```

---

#### 取消订阅

**Event:** `unsubscribe`

```yaml
{
  "session_id": "sess_abc123"           # string, 必填, 要取消订阅的会话ID
}
```

**Response (Socket.IO ack):**

```yaml
{
  "success": true
}
```

---

#### 请求历史推理结果

**Event:** `get_history`

```yaml
{
  "session_id": "sess_abc123",          # string, 必填, 会话ID
  "limit": 100                          # number, 可选, 返回条数, 默认100, 最大1000
}
```

**Response (Socket.IO ack):**

```yaml
{
  "success": true,
  "results": [
    {
      "frame_id": 1234,
      "timestamp": 1715678900.123,
      "detections": [...],
      "debug": {...}
    }
  ],
  "total": 150,
  "returned": 100
}
```

