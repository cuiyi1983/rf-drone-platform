## 4. Socket.IO 消息格式

### 4.1 连接建立

```javascript
// 前台连接
const socket = io('http://platform-backend:8080', {
  transports: ['websocket', 'polling'],  // 优先websocket，回退polling
  reconnection: true,
  reconnectionDelay: 1000,
  reconnectionAttempts: 10
});

// 认证（可选）
socket.emit('auth', { token: 'xxx' });
```

### 4.2 房间管理

每个会话对应一个 Socket.IO Room：

```javascript
// 订阅某个会话的数据推送
socket.emit('subscribe', { session_id: 'sess_abc123' });
socket.join('session:sess_abc123');  // 自动加入对应room

// 取消订阅
socket.emit('unsubscribe', { session_id: 'sess_abc123' });
socket.leave('session:sess_abc123');
```

### 4.3 命名空间

| Namespace | 用途 |
|---|---|
| `/` | 默认命名空间，推送推理结果和采集统计 |
| `/admin` | 管理操作（预留） |

