## 6. 与其他接口文件的关系

### 6.1 接口层次

```
┌─────────────────────────────────────┐
│        Frontend (Web UI)            │
│   ←→ REST API + Socket.IO 连接      │
└───────────────┬─────────────────────┘
                │
                ▼
┌─────────────────────────────────────┐
│      Platform Backend               │
│   ←→ REST API (控制面)             │
│   ←→ Socket.IO (数据面)            │
│   ←→ /collector/* (内部调用)        │
└───────────────┬─────────────────────┘
                │
                ▼
┌─────────────────────────────────────┐
│      Collector Service             │
│   ←→ REST API (collector-api.yaml) │
└─────────────────────────────────────┘
```

### 6.2 与 collector-api.yaml 的关系

| 本文件 | collector-api.yaml | 关系 |
|---|---|---|
| `GET /api/v1/devices` | `GET /collector/devices` | Platform 透传 Collector 设备列表 |
| `GET /api/v1/devices/{id}/capabilities` | `GET /collector/devices/{id}/capabilities` | Platform 透传设备能力 |
| `POST /api/v1/session/start` | — | Platform 独有，调用 Config Manager |

### 6.3 端口约定

| 服务 | 端口 | 说明 |
|---|---|---|
| Platform Backend | 8080 | REST API + Socket.IO |
| Collector Service | 8081 | collector-api.yaml |
| Frontend (Web UI) | 3000 | 开发环境 |

