#### 刷新设备列表

```
POST /api/v1/devices/refresh
```

重新扫描 Collector 设备列表（清缓存后重新 discover）。点击前端「刷新设备」按钮时调用。

**Response (200):**

```yaml
{
  "devices": [...}   # 同 GET /api/v1/devices
```

---

#### 获取设备能力（统一格式）

```
GET /api/v1/devices/{id}/capabilities
```

**Path Parameters:**

```yaml
id: string  # 设备ID
```

**Response (200):**

```yaml
{
  "capabilities": {
    "frequency": {
      "type": "int",
      "range": [325000000, 6000000000],
      "default": 5805000000
    },
    "buffer_size": {
      "type": "int",
      "range": [1024, 1048576],
      "default": 524288
    },
    "gain": {
      "type": "float",
      "range": [0, 60],
      "default": 20
    },
    "sample_rate": {
      "type": "int",
      "fixed": 60000000
    },
    "rf_bandwidth": {
      "type": "int",
      "fixed": 56000000
    }
  }
}
```

**说明**：与 collector-api.yaml 的 discover 返回格式保持一致。

