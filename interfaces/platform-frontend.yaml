## 3. Socket.IO 事件（数据面）

### 3.1 后台 → 前台推送

#### 推理结果

**Event:** `inference_result`

```yaml
{
  "session_id": "sess_abc123",          # string, 会话ID
  "frame_id": 1234,                     # number, 帧序号
  "timestamp": 1715678900.123,          # number, Unix时间戳
  "detections": [                        # array, 检测结果列表
    {
      "model": "DJI_MAVIC3_PRO",        # string, 模型名称
      "confidence": 0.95,               # number, 置信度 (0-1)
      "frequency": 5800000000           # number, 检测频率 (Hz)
    }
  ],
  "debug": {                            # object, 调试信息
    "inference_time_ms": 12.5,          # number, 单次推理总耗时
    "stft_time_ms": 3.2,                # number, STFT耗时
    "model_time_ms": 8.1,               # number, 模型推理耗时
    "device": "npu",                     # string, 运行设备
    "memory_mb": 256                     # number, 内存占用
  }
}
```

**推送频率**：每帧推理完成（1-7次/秒，取决于buffer_size配置）

---

#### 采集统计

**Event:** `collector_stats`

```yaml
{
  "session_id": "sess_abc123",          # string, 会话ID
  "frames_per_second": 6.5,             # number, 采集帧率
  "dropped_rate": 0.02,                 # number, 丢弃率 (0-1)
  "buffer_level": 45,                    # number, 帧队列当前深度
  "total_frames": 10000,                 # number, 累计采集帧数
  "total_dropped": 50                    # number, 累计丢弃帧数
}
```

**推送频率**：每秒一次

---

#### 设备状态

**Event:** `device_status`

```yaml
{
  "event": "disconnected",              # string, "connected" | "disconnected" | "error"
  "device_id": "pluto_usb_2.6.5",       # string, 设备ID
  "timestamp": 1715678900.123,           # number, Unix时间戳
  "detail": "USB cable unplugged"       # string, 可选, 详情描述
}
```

**推送频率**：实时（状态变化时）

---

#### 错误通知

**Event:** `error`

```yaml
{
  "code": 2001,                         # number, 错误码
  "message": "组件初始化失败: 模型文件损坏",  # string, 错误信息
  "session_id": "sess_abc123",           # string, 可选, 关联会话
  "timestamp": 1715678900.123           # number, Unix时间戳
}
```

**推送频率**：实时（发生错误时）

