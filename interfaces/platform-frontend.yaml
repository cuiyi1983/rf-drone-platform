## 1. 概述

### 1.1 设计原则

- **Config Manager 在后端**：前端只调用 REST API，不直接管理配置
- **Socket.IO 替代原生 WebSocket**：稳定性原因，推送推理结果、设备状态、采集统计
- **配置分层**：Platform 定义范围 + Component 提供建议 + Collector 只执行

### 1.2 传输协议

| 通道 | 协议 | 用途 |
|---|---|---|
| 控制面 | REST API | 会话管理、组件查询、设备查询 |
| 数据面 | Socket.IO | 实时推送推理结果、设备状态、采集统计 |

