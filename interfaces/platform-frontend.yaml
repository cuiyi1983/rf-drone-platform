## 2. REST API（控制面）

### 2.1 会话管理

#### 启动会话

```
POST /api/v1/session/start
```

**Request:**

```yaml
{
  "component_id": "rfuav-two-stage",   # string, 必填, 组件ID
  "config": {                          # object, 可选, 运行配置
    "confidence_threshold": 0.5
  }
}
```

**Response (200):**

```yaml
{
  "session_id": "sess_abc123",          # string, 会话ID
  "status": "running"                   # string, 当前状态
}
```

**Error (400/404/500):**

```yaml
{
  "code": 1001,
  "message": "组件不存在或初始化失败"
}
```

---

#### 停止会话

```
POST /api/v1/session/stop
```

**Request:**

```yaml
{
  "session_id": "sess_abc123"           # string, 必填, 会话ID
}
```

**Response (200):**

```yaml
{
  "status": "stopped",                  # string, 已停止
  "stats": {
    "frames_received": 10000,
    "frames_dropped": 50,
    "duration_seconds": 3600,
    "detections_count": 12
  }
}
```

---

#### 查询会话状态

```
GET /api/v1/session/status
```

**Query Parameters:**

```yaml
session_id: string  # 可选, 不提供则返回所有活跃会话
```

**Response (200):**

```yaml
{
  "sessions": [                         # 不带 session_id 时返回数组
    {
      "session_id": "sess_abc123",
      "status": "running",
      "component_id": "rfuav-two-stage",
      "device_info": {
        "type": "PlutoSDR",
        "uri": "usb:2.6.5",
        "center_freq": 5800000000,
        "sample_rate": 60000000
      },
      "current_config": {
        "confidence_threshold": 0.5,
        "buffer_size": 524288,
        "frequencies": [5805000000, 2450000000],
        "gain": 20
      },
      "started_at": "2026-05-14T15:00:00Z"
    }
  ]
}
# 或单个会话（带 session_id 参数时）
{
  "session_id": "sess_abc123",
  "status": "running",
  "component_id": "rfuav-two-stage",
  "device_info": {...},
  "current_config": {...},
  "started_at": "2026-05-14T15:00:00Z"
}
```

