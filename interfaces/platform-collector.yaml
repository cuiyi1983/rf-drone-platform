## 3. 配置冲突处理

当用户手动配置与组件推荐冲突时：

```
场景：用户配置的 sample_rate < 组件要求的 min_sample_rate

Platform Backend 处理流程：
1. 读取组件 collector_requirements.min_sample_rate
2. 比较用户配置
3. 若冲突：
   - 拒绝启动采集
   - 推送警告到 Frontend
   - 显示需要调整的参数及原因

冲突响应示例：
{
  "code": 409,
  "message": "配置的采样率低于组件要求",
  "conflicts": [
    {
      "parameter": "sample_rate",
      "user_value": "30e6",
      "min_required": "60e6",
      "component_id": "rfuav-two-stage"
    }
  ],
  "suggested_fix": {
    "sample_rate": "60e6"
  }
}
```

