# 接口协议：平台与采集模块的协同接口

> 版本 v1.0 — 2026-05-14
> 状态：已确立
> 负责Agent：技术总监

---

## 1. 平台向采集模块推送配置

当用户在 Frontend 配置采数参数时，Platform Backend 转发配置到 Collector Service。

### POST /collector/apply_component_config

接收推理组件推荐的采数配置（由组件 manifest 中的 collector_config_template 生成）

```yaml
Request:
  body:
    source: "component"                # 配置来源标识
    component_id: "rfuav-two-stage"
    config:
      mode: frequency_hopping
      frequencies: [5760, 5775, 5800, 5825, 5850]
      sample_rate: 60e6
      burst_count: 200
      gain: 60
    apply_as_default: true            # 是否作为默认配置

Response:
  200:
    code: 0
    message: "组件推荐配置已应用"
    applied_config: {...}
    platform_overrides: {}           # 平台override的部分（如果有）
```

