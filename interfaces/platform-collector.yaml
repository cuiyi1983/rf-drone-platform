## 3. 配置流程（含 Config Manager）

首次启动：
  Collector.discover() → 返回 capability range → Config Manager 缓存

运行时：
  用户选择组件 → Platform 读取 manifest
              → Config Manager 加载 collector_capabilities
              → 合并：component建议值 ∩ 能力范围 → 最终配置
              → WARNING 如有降级
              → POST /collector/start 下发最终配置
              → Collector 执行（只执行，不决策）

---

## 4. 采集器能力范围（Platform Config Manager 使用）

Platform 通过 /collector/discover 获取硬件能力，Config Manager 缓存此 Schema，
用于验证和合并组件推荐配置。

### 4.1 Capability Range Schema

```yaml
collector_capabilities:
  frequency:
    type: int
    range: [325000000, 6000000000]
    default: 5805000000
    unit: Hz
  buffer_size:
    type: int
    range: [1024, 1048576]
    default: 524288
    unit: samples
  gain:
    type: float
    range: [0, 60]
    default: 20
    unit: dB
  sample_rate:
    type: int
    fixed: 60000000
    unit: Hz
  rf_bandwidth:
    type: int
    fixed: 56000000
    unit: Hz
```

### 4.2 配置合并规则

1. 采样率/带宽：fixed，不参与合并
2. 可配置参数：以 component 建议值为准，不超出能力范围
3. 越界处理：component 要求超出范围 → 降级到边界值 + WARNING
4. 缺失处理：component 未声明 → 使用 capability default

