## 2. 采集模块主动上报

### 2.1 设备状态变更上报

当 Pluto 设备连接/断开时，Collector Service 主动通知 Platform。

```
POST /platform/device_event (Platform Backend 的回调接口)

Body:
{
  "event": "device_connected" | "device_disconnected" | "device_error"
  "device_id": "usb:2.6.5"
  "timestamp": 1715678900.123
  "detail": {}  # 事件详情
}
```

### 2.2 采集统计上报

定期推送采集统计（可选）

```
Body:
{
  "type": "collector_stats"
  "session_id": "uuid"
  "stats":
    bursts_per_second: 58.5
    dropped_rate: 0.001
    avg_signal_strength: -40.5
    timestamp: 1715678900.123
}
```

