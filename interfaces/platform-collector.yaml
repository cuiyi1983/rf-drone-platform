## 1. 平台向采集模块推送配置

### POST /collector/apply_component_config

接收推理组件推荐的采数配置（由组件 manifest 中的 collector_requirements 生成）

```yaml
Request:
  body:
    source: "component"
    component_id: "rfuav-two-stage"
    requirements:
      min_data_points: 60000
    config:
      sample_rate: 60e6      # 固定值
      frequencies: [5760, 5775, 5800, 5825, 5850]

Response:
  200:
    code: 0
    message: "配置已应用"
```

